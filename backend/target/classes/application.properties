spring.application.name=computer-repair-shop

# SQLite datasource
spring.datasource.url=jdbc:sqlite:./data/repairshop.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Spring Data JDBC
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Server
server.port=8080

# JWT
jwt.secret=your-256-bit-secret-key-here-change-in-production

# Allow large payloads for image uploads (base64 encoded)
spring.servlet.multipart.max-file-size=150MB
spring.servlet.multipart.max-request-size=150MB
server.tomcat.max-http-form-post-size=150MB
